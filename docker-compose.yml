services:
  nearu-redis:
    image: redis:7-alpine
    container_name: nearu-redis
    restart: always
    networks:
      - nearu-internal

  nearu-db:
    image: postgis/postgis:17-3.5-alpine
    container_name: nearu-db
    restart: always
    ports:
      - "54321:5432" # Exposed for team access as requested
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - nearu_db_data:/var/lib/postgresql/data
    networks:
      - nearu-internal

  # ── OSRM routing engine ───────────────────────────────────────────────────
  # Map data must be pre-processed on the VPS before first run — see README.
  # Pre-processed files live in /etc/nearu/osrm/ on the host.
  nearu-osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: nearu-osrm
    restart: always
    command: osrm-routed --algorithm mld /data/sri-lanka-latest.osrm --max-table-size 1000
    volumes:
      - /etc/nearu/osrm:/data:ro   # read-only: processed map files
    networks:
      - nearu-internal
    # Not exposed to the internet — only reachable by the API container
    # ─────────────────────────────────────────────────────────────────────────

  api:
    image: ghcr.io/nearu-project-susl/nearu-backend:latest
    container_name: nearu-api
    restart: unless-stopped
    depends_on:
      - nearu-db
      - nearu-redis
      - nearu-osrm
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__PostgreSQL=Host=nearu-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=nearu-redis:6379
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=https://api.nearusab.me
      - JwtSettings__Audience=NearU-Client
      - JwtSettings__AccessTokenExpiryInMinutes=15
      - JwtSettings__RefreshTokenExpiryInDays=7
      - ImageKit__PublicKey=${IMAGEKIT_PUBLIC_KEY}
      - ImageKit__PrivateKey=${IMAGEKIT_PRIVATE_KEY}
      - ImageKit__UrlEndpoint=${IMAGEKIT_URL_ENDPOINT}
      - Firebase__CredentialsPath=/app/firebase-adminsdk.json
      - SendGrid__ApiKey=${SendGrid__ApiKey}
      - SendGrid__FromEmail=${SendGrid__FromEmail}
      - AdminSeed__Email=${AdminSeed__Email}
      # ── OSRM ──────────────────────────────────────────────────────────────
      - OsrmSettings__BaseUrl=http://nearu-osrm:5000
      - OsrmSettings__Profile=driving
      - OsrmSettings__TimeoutSeconds=5
      - OsrmSettings__ThrowOnFailure=false
      # ──────────────────────────────────────────────────────────────────────
    volumes:
      - /etc/nearu/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    networks:
      - nearu-internal
      - nearu-proxy
    # Note: Healthcheck is removed because .NET "Chiseled" images
    # do not contain 'curl' or a shell to run the test.

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      # Mount the host docker socket as Read-Only (:ro) so Dozzle can stream logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_HOSTNAME=NearU-Dev-Droplet
    networks:
      - nearu-internal
      - nearu-proxy

networks:
  nearu-internal:
    driver: bridge
  nearu-proxy:
    external: true
    name: nearu-backend_nearu-proxy # Matches your existing Nginx network

volumes:
  nearu_db_data:
