name: CD — Build & Deploy on Merge

# Fires ONLY when a PR is merged into dev (or a direct push — which is
# blocked by branch protection rules, so this only runs after a reviewed merge).
on:
  push:
    branches: [ dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/nearu-project-susl/nearu-backend

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # Job 2: Deploy to DigitalOcean Droplet
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_PAT,GITHUB_ACTOR
          script: |
            echo "$GH_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /opt/nearu
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete at $(date)"
