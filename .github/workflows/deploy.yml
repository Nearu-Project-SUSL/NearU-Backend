name: CD — Build & Deploy on Merge

# Fires ONLY when a PR is merged into dev (or a direct push — which is
# blocked by branch protection rules, so this only runs after a reviewed merge).
on:
  push:
    branches: [ dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/nearu-project-susl/nearu-backend

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: Test Gate — ensures tests always pass before deploy,
  # even on direct pushes that bypass the CI PR check.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore main project
        run: dotnet restore NearU_Backend_Revised.csproj

      - name: Restore test project
        run: dotnet restore NearU_Backend.Tests/NearU_Backend.Tests.csproj

      - name: Build main project
        run: dotnet build NearU_Backend_Revised.csproj -c Release --no-restore

      - name: Build test project
        run: dotnet build NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-build --verbosity normal

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image to GHCR
  # Uses the built-in GITHUB_TOKEN (auto-managed, never expires)
  # instead of a Personal Access Token for the push step.
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Using the built-in GITHUB_TOKEN — auto-managed, never expires,
          # and scoped only to this workflow run.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # Job 3: Deploy to DigitalOcean Droplet
  # The Droplet still uses GH_PAT for external GHCR login
  # (GITHUB_TOKEN is scoped to workflow runs only).
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/nearu-backend/"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_PAT,GITHUB_ACTOR
          script: |
            echo "$GH_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd ~/nearu-backend
            docker compose pull
            docker compose up -d
            docker system prune -f
            echo "✅ Deployment complete at $(date)"
