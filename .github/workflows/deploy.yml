name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [ dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/nearu-project-susl/nearu-backend

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: Quality Gate — Run Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore main project
        run: dotnet restore NearU_Backend_Revised.csproj

      - name: Restore test project
        run: dotnet restore NearU_Backend.Tests/NearU_Backend.Tests.csproj

      - name: Build main project
        run: dotnet build NearU_Backend_Revised.csproj -c Release --no-restore

      - name: Build test project
        run: dotnet build NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-build --verbosity normal

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # Job 3: Deploy to DigitalOcean Droplet
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_PAT,GITHUB_ACTOR
          script: |
            echo "$GH_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /opt/nearu
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete at $(date)"
