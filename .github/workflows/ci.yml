name: CI — Pull Request Quality Gate

# Runs on every PR targeting the dev branch.
# This is the required status check that must pass before merging.
on:
  pull_request:
    branches: [ dev ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Cache NuGet packages to speed up subsequent runs (~30-60s savings)
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore main project
        run: dotnet restore NearU_Backend_Revised.csproj

      - name: Restore test project
        run: dotnet restore NearU_Backend.Tests/NearU_Backend.Tests.csproj

      - name: Build main project
        run: dotnet build NearU_Backend_Revised.csproj -c Release --no-restore

      - name: Build test project
        run: dotnet build NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test NearU_Backend.Tests/NearU_Backend.Tests.csproj -c Release --no-build --verbosity normal
